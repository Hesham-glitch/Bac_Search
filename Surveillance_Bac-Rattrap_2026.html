<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أيام مراقبة البكالوريا - الدورة الاستدراكية 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; text-align: center; padding: 50px 20px; margin: 0; }
        .container { max-width: 500px; background: white; margin: 0 auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; margin-bottom: 25px; }
        input[type="text"] { width: 80%; padding: 12px; font-size: 16px; border: 2px solid #bdc3c7; border-radius: 6px; margin-bottom: 15px; outline: none; text-align: center; }
        button { background-color: #2ecc71; color: white; border: none; padding: 12px 25px; font-size: 16px; cursor: pointer; border-radius: 6px; width: 86%; font-weight: bold; }
        button:hover { background-color: #27ae60; }
        .result-box { margin-top: 25px; padding: 15px; border-radius: 6px; display: none; font-size: 18px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>الامتحان الوطني الموحد - الدورة الاستدراكية</h2>
    <p>أدخل رقم التأجير لمعرفة أيام المراقبة الخاصة بك:</p>
    
    <input type="text" id="teacherId" placeholder="رقم التأجير (مثال: 123456)">
    <button onclick="checkDuty()">بحث</button>

    <div id="result" class="result-box"></div>
</div>

<script>
    // ⚠️ استبدل الرابط أدناه برابط الـ Web app URL الذي نسخته من جوجل شيت
    const googleScriptUrl = "https://script.google.com/macros/s/AKfycbzr6VVfy18yg9dD_XgVbi0bINTDFTXeUgFXkue1YkvhiUpWKeQwhP3uK50Z4BHdjDy0/exec";

    async function checkDuty() {
        const inputId = document.getElementById('teacherId').value.trim();
        const resultDiv = document.getElementById('result');
        
        resultDiv.style.display = "none";
        resultDiv.className = "result-box";

        if (inputId === "") {
            resultDiv.innerHTML = "الرجاء إدخال رقم التأجير أولاً.";
            resultDiv.classList.add('error');
            resultDiv.style.display = "block";
            return;
        }

        // إظهار رسالة جاري البحث
        resultDiv.innerHTML = "جاري البحث في قاعدة البيانات...";
        resultDiv.classList.add('loading');
        resultDiv.style.display = "block";

        try {
            // الاتصال بجوجل شيت وجلب السطر الخاص بالأستاذ فقط
            const response = await fetch(`${googleScriptUrl}?id=${inputId}`);
            const data = await response.json();

            resultDiv.className = "result-box"; // مسح كلاس الـ loading

            if (data.status === "success") {
                resultDiv.innerHTML = `<strong>الأستاذ(ة):</strong> ${data.name} <br><br> <strong>أيام المراقبة:</strong> <span style="color:#e74c3c;">${data.days}</span>`;
                resultDiv.classList.add('success');
            } else {
                resultDiv.innerHTML = "عذراً، رقم التأجير هذا غير مسجل في لوائح المراقبة.";
                resultDiv.classList.add('error');
            }
        } catch (error) {
            resultDiv.className = "result-box";
            resultDiv.innerHTML = "حدث خطأ أثناء الاتصال بالسيرفر. يرجى المحاولة لاحقاً.";
            resultDiv.classList.add('error');
        }
    }
</script>

</body>
</html>
